name: CyberWatch Daily Digest

on:
  schedule:
    # 7h00 heure Paris (CEST = UTC+2 en ete) = 5h00 UTC
    # En hiver (CET = UTC+1) le mail arrivera a 6h00 Paris
    - cron: "0 5 * * *"
  workflow_dispatch:  # Permet de lancer manuellement pour tester

jobs:
  send-digest:
    name: Fetch RSS & Send Email Digest
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install feedparser pyyaml

      - name: Send daily digest
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          DIGEST_RECIPIENT: ${{ secrets.SMTP_USER }}
        run: python scripts/daily_digest_cloud.py
