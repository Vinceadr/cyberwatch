      category: "Cybersecurite"
      enabled: false

# --- Base de donnees ---
database:
  path: "data/db/cyberwatch.db"
  backup_enabled: true
  backup_interval_hours: 24

# --- Retention ---
retention:
  days: 7
  purge_day: "sunday"
  purge_time: "00:00"

# --- LLM (Ollama) ---
llm:
  provider: "ollama"
  base_url: "http://localhost:11434"
  model: "llama3.1:8b"
  fallback_model: "mistral:7b"
  timeout_seconds: 120
  tasks:
    summarize:
      system_prompt: >
        Tu es un analyste en cybersecurite. Resume cet article en 3-5 phrases.
        Identifie: la menace, les systemes affectes, la severite, les actions recommandees.
        Reponds en francais.
      max_tokens: 500
    classify:
      system_prompt: >
        Classe cette alerte selon sa severite: CRITIQUE, HAUTE, MOYENNE, BASSE, INFO.
        Reponds uniquement par le niveau de severite.
      max_tokens: 10

# --- Email / Alertes ---
email:
  enabled: false
  smtp:
    host: "smtp.gmail.com"
    port: 587
    use_tls: true
    username: "${CYBERWATCH_SMTP_USER}"
    password: "${CYBERWATCH_SMTP_PASS}"
  sender: "cyberwatch@localhost"
  recipients:
    - "admin@example.com"
  schedule:
    daily_digest: "08:00"
    critical_immediate: true

# --- Scheduler ---
scheduler:
  fetch_interval_minutes: 30
  digest_time: "08:00"
  enabled: true

# --- GUI ---
gui:
  theme: "dark"
  window_width: 1200
  window_height: 800
  refresh_interval_seconds: 300

